                  if (block.timestamp - timestamp < STALE_DATA_WINDOW) {
                      tempNodes[count] = address(oracles[i]);
                      count++;
                  }
              }
              address[] memory activeNodes = new address[](count);
              for (uint256 j = 0; j < count; j++) {
                  activeNodes[j] = tempNodes[j];
              }
              return activeNodes;
          }
