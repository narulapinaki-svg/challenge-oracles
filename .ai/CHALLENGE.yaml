      solution: |
        function getState(uint256 assertionId) external view returns (State) {
            EventAssertion storage a = assertions[assertionId];
            if (a.asserter == address(0)) return State.Invalid;
            if (a.winner != address(0)) return State.Settled;
            if (a.disputer != address(0)) return State.Disputed;
            if (a.proposer == address(0)) {
                if (block.timestamp > a.endTime) return State.Expired;
                return State.Asserted;
            }
            if (block.timestamp > a.endTime) return State.Settled;
            return State.Proposed;
        }

        function getResolution(uint256 assertionId) external view returns (bool) {
            EventAssertion storage a = assertions[assertionId];
            if (a.asserter == address(0)) revert AssertionNotFound();
            if (a.proposer == address(0)) revert NotProposedAssertion();
            if (a.disputer == address(0)) {
                if (block.timestamp <= a.endTime) revert InvalidTime();
                return a.proposedOutcome;
            } else {
                if (a.winner == address(0)) revert AwaitingDecider();
                return a.resolvedOutcome;
            }
        }

completion_message: |
  Congratulations — you've completed the Oracle Challenge!

  You built three fundamentally different oracle architectures:

  **Whitelist Oracle** — Centralized price aggregation with median calculation
  - Factory pattern for deploying SimpleOracle contracts
  - Stale data filtering and median-based outlier resistance

  **Staking Oracle** — Decentralized with economic incentives
  - ERC-20 token staking with approve/transferFrom
  - Bucket-based reporting with median finalization
  - Inactivity penalties and slashing for deviated prices
  - Reward system for active reporters

  **Optimistic Oracle** — Dispute-based for any binary question
  - Assertion/proposal/dispute lifecycle
  - Bond mechanics creating skin in the game
  - Decider-based dispute resolution
  - State machine for tracking assertion lifecycle

  Key takeaways:
  - **Whitelist**: Fast and simple, but requires trust
  - **Staking**: Decentralized with economic security, but complex
  - **Optimistic**: Flexible for any question, efficient when honest, but higher latency

  ## Next Steps

  To submit your challenge, complete the remaining checkpoints on the
  [Speedrun Ethereum challenge page](https://speedrunethereum.com/challenge/oracles):
  - Deploy your contract
  - Ship your frontend
  - Verify your contract
