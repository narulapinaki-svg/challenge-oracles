           - Transfer `reward + bond` to proposer

        2. **`claimDisputedReward(uint256 assertionId)`**
           - Proposal + dispute must exist, winner must be set, not claimed
           - Set `claimed = true`
           - Transfer loser's bond to `decider`
           - Transfer `reward + bond` to winner

        3. **`claimRefund(uint256 assertionId)`**
           - No proposer, past endTime, not claimed
           - Set `claimed = true`, refund reward to asserter

        4. **`settleAssertion(uint256 assertionId, bool resolvedOutcome)`**
           - Only decider (modifier already on skeleton)
           - Proposal + dispute must exist, winner not yet set
           - Set `resolvedOutcome`, determine winner based on whether `proposedOutcome == resolvedOutcome`

        Say **"check"** when you're ready!
