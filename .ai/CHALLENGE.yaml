        **State-changing functions:**
        8. `registerNode(uint256 amount)` — stake ORA to become a node
        9. `addStake(uint256 amount)` — increase stake
        10. `reportPrice(uint256 price)` — report price for current bucket
        11. `claimReward()` — claim ORA for reports made
        12. `recordBucketMedian(uint256)` — finalize a past bucket's median
        13. `slashNode(address, uint256, uint256, uint256)` — slash a deviated node
