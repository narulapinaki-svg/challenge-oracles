    context: |
      ## Building the Core

      Open `packages/hardhat/contracts/02_Optimistic/OptimisticOracle.sol`. The contract skeleton has all structs, events, errors, and modifiers defined. You need to implement the logic.

      ### EventAssertion Struct

      Each assertion stores:
      ```solidity
      struct EventAssertion {
          address asserter;        // who created it
          address proposer;        // who proposed an outcome
          address disputer;        // who disputed (if any)
          bool proposedOutcome;    // the proposed answer
          bool resolvedOutcome;    // the final answer
          uint256 reward;          // ETH reward for correct proposal
          uint256 bond;            // required bond (2x reward)
          uint256 startTime;       // when proposals can begin
          uint256 endTime;         // deadline
          bool claimed;            // whether reward was claimed
          address winner;          // final winner
          string description;      // the question being asked
      }
      ```

      ### assertEvent — Creating a Question

      - Takes `description`, `startTime`, `endTime`
      - `msg.value` is the reward (must be > 0)
      - `startTime = 0` defaults to `block.timestamp`
      - `endTime = 0` defaults to `startTime + MINIMUM_ASSERTION_WINDOW`
      - Bond is set to `msg.value * 2`
      - Store in `assertions[nextAssertionId]` and increment the ID

      ### proposeOutcome — Answering the Question

      - Must happen within the assertion window (`startTime` to `endTime`)
      - `msg.value` must equal the assertion's `bond`
      - Sets the `endTime` to `block.timestamp + DISPUTE_WINDOW` (starts the dispute clock)

      ### disputeOutcome — Challenging the Answer

      - Must happen before the new `endTime` (dispute window)
      - `msg.value` must equal the assertion's `bond`
      - Records the disputer

