name: "Oracles"
version: "1.0"
description: "Build three oracle architectures — Whitelist, Staking, and Optimistic — to understand how real-world data gets on-chain securely"
difficulty: "intermediate"
estimated_time: "4 - 12 hours"

setup:
  file: "packages/hardhat/contracts/00_Whitelist/WhitelistOracle.sol"

welcome_message: |
  Welcome to the Oracle Challenge!

  You'll build **three oracle systems** from scratch, each representing a fundamentally different approach to bringing off-chain data on-chain:

  1. **Whitelist Oracle** — Simple, centralized price aggregation with median calculation
  2. **Staking Oracle** — Decentralized with ERC-20 staking, slashing, and economic incentives
  3. **Optimistic Oracle** — Dispute-based system for any binary question, inspired by UMA Protocol

  **Before we start, open separate terminal windows** (not this one!) and run:

  1. Start your local blockchain:
     ```
     yarn chain
     ```
  2. In another terminal, deploy the contracts:
     ```
     yarn deploy
     ```
  3. In another terminal, start the frontend:
     ```
     yarn start
     ```
  4. Open http://localhost:3000 in your browser.

  > These commands run continuously, so each needs its own terminal window.

  `yarn deploy` will likely fail initially since the contracts aren't ready yet — that's expected!

  > Rerun `yarn deploy` whenever you want to deploy new contracts to the frontend. If you haven't made any contract changes, you can run `yarn deploy --reset` for a completely fresh deploy.

  **How this works:**
  - I'll teach you a concept, then give you a coding task
  - You write the code in your editor, then say **"check"** and I'll run the tests
  - Say **"hint"** anytime you're stuck — hints get progressively more specific
  - Use **`/skip`** if you want me to write the code and explain it

  Your progress is saved automatically. Use `/start` to resume anytime.

  Let's build some oracles!

