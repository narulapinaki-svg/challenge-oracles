  - id: "optimistic-state"
    title: "Optimistic Oracle — State Management"
    description: "Implement getState and getResolution for querying assertion lifecycle"

    context: |
      ## State Machine

      Every assertion moves through a lifecycle. The `getState` function returns where it currently is:

      ```
      Invalid → Asserted → Proposed → Settled (undisputed)
                                    → Disputed → Settled (by decider)
                         → Expired (no proposal by deadline)
      ```

      The states are defined as an enum:
      ```solidity
      enum State { Invalid, Asserted, Proposed, Disputed, Settled, Expired }
      ```

      ### Deriving State from Struct Fields

      You can determine the state by checking which fields are set:

      - `asserter == address(0)` → **Invalid** (doesn't exist)
      - `winner != address(0)` → **Settled** (decider resolved it)
      - `disputer != address(0)` → **Disputed** (awaiting decider)
      - `proposer == address(0)`:
        - Past endTime → **Expired**
        - Otherwise → **Asserted** (waiting for proposals)
      - `proposer != address(0)`:
        - Past endTime → **Settled** (dispute window passed, can claim)
        - Otherwise → **Proposed** (in dispute window)

      ### getResolution

      Returns the final boolean outcome. Must handle two paths:
      - **Undisputed**: after dispute window passes, return `proposedOutcome`
      - **Disputed**: after decider sets winner, return `resolvedOutcome`

    questions:
