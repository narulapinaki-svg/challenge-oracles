  # CHECKPOINT 2: Staking Oracle
  # ============================================================
  - id: "staking-oracle"
    title: "Staking Oracle"
    description: "Build a decentralized oracle with ERC-20 staking, bucket-based reporting, slashing, and economic incentives"

    context: |
      ## Staking Oracle Architecture

      Unlike the whitelist oracle's centralized control, the staking oracle uses **economic incentives** to encourage honest reporting:

      - Nodes stake **ORA** (ERC-20 token) to participate
      - Nodes report prices **once per bucket** (a bucket spans 24 blocks by default)
      - Buckets are finalized by recording the **median** price
      - Nodes that deviate too far from the median get **slashed**
      - Active reporters earn **ORA rewards**

      ### Key Concepts

      **Bucket System** — Time is divided into fixed windows:
      ```solidity
      function getCurrentBucketNumber() public view returns (uint256) {
          return (block.number / BUCKET_WINDOW) + 1;  // 1-indexed
      }
      ```

      **ERC-20 Staking** — Nodes approve and transfer ORA tokens:
      ```solidity
      bool success = oracleToken.transferFrom(msg.sender, address(this), amount);
      ```

      **Effective Stake** — Inactivity reduces stake over time. For each missed bucket, `INACTIVITY_PENALTY` is subtracted. Nodes in the current bucket don't count that bucket's report as "completed" yet.

      **Median Finalization** — Anyone can call `recordBucketMedian(bucket)` for past buckets. This sorts a **memory copy** of prices (to preserve storage ordering for slashing) and stores the median.

      **Slashing** — If a node's reported price deviates > `MAX_DEVIATION_BPS` (10%) from the recorded median, anyone can slash them. The slasher gets a percentage of the penalty as reward.

      **Deviation Check** — Basis points comparison:
      ```solidity
      uint256 deviation = reportedPrice > medianPrice ? reportedPrice - medianPrice : medianPrice - reportedPrice;
      uint256 deviationBps = (deviation * 10_000) / medianPrice;
      return deviationBps > MAX_DEVIATION_BPS;
      ```

      Open `packages/hardhat/contracts/01_Staking/StakingOracle.sol` — there are 16 functions to implement. The contract skeleton has all structs, events, errors, and modifiers already defined.

    questions:
