    task:
      description: |
        Still in `packages/hardhat/contracts/02_Optimistic/OptimisticOracle.sol`.

        Implement two functions:

        1. **`getState(uint256 assertionId)`** — Return the current `State` enum:
           - Check fields in order: Invalid, Settled (winner set), Disputed, then check proposer presence + timing for Expired/Asserted/Proposed/Settled

        2. **`getResolution(uint256 assertionId)`** — Return the boolean outcome:
           - Revert if assertion doesn't exist (`AssertionNotFound`)
           - Revert if no proposal exists (`NotProposedAssertion`)
           - If undisputed: revert if deadline hasn't passed (`InvalidTime`), return `proposedOutcome`
           - If disputed: revert if no winner set (`AwaitingDecider`), return `resolvedOutcome`

        Say **"check"** when you're ready!

