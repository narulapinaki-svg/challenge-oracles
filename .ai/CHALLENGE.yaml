        Open `packages/hardhat/contracts/01_Staking/StakingOracle.sol`.

        Implement all 16 functions. Here's a summary of each:

        **View functions:**
        1. `getCurrentBucketNumber()` — `(block.number / BUCKET_WINDOW) + 1`
        2. `getNodeAddresses()` — return the `nodeAddresses` array
        3. `getEffectiveStake(address)` — compute stake minus inactivity penalties
        4. `getLatestPrice()` — return median from `getCurrentBucketNumber() - 1`
