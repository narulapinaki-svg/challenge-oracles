        > "Insufficient Stake" errors? Your staked balance has fallen below the minimum due to inactivity penalties. Buy more ORA and add stake.

        Run `yarn simulate:staking` to watch a live simulation with multiple nodes:
        ```
        yarn simulate:staking
        ```
        Press the gear icon on simulation nodes to adjust price deviation and skip probability. Navigate to past buckets to see the "slash" button on deviated nodes.

