        4. **Propose an outcome**: Use the UI to propose true/false for your assertion
        5. **Dispute an outcome**: Try disputing a proposal using the dispute button
        6. **Wait for settlement**: Watch the dispute window expire — undisputed proposals settle automatically. For disputes, the decider must choose the winner
        7. **Check outcomes**: View the resolution and settlement status for each assertion in the table

        Run `yarn simulate:optimistic` to see the full optimistic oracle lifecycle with automated bots:
