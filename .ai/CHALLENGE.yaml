  # ============================================================
  # CHECKPOINT 1: Whitelist Oracle
  # ============================================================
  - id: "whitelist-oracle"
    title: "Whitelist Oracle"
    description: "Build a centralized oracle that aggregates prices from multiple whitelisted sources using median calculation"

    context: |
      ## What is an Oracle?

      Oracles are bridges between blockchains and the external world. Smart contracts can only access data on-chain, but most real-world data (prices, weather, sports scores) exists off-chain. Oracles solve this by bringing external data on-chain.

      ## Whitelist Oracle Architecture

      The simplest oracle design uses a **centralized authority** to control which data sources can provide information. Our system has two layers:

      ### SimpleOracle — The Building Block

      Each `SimpleOracle` is a basic contract where an owner can set a price:

      ```solidity
      function setPrice(uint256 _newPrice) public onlyOwner { ... }
      function getPrice() public view returns (uint256 price, uint256 timestamp) { ... }
      ```

      ### WhitelistOracle — The Aggregator

      The `WhitelistOracle` **creates and manages multiple SimpleOracle contracts**:

      ```solidity
      SimpleOracle[] public oracles;  // Array of SimpleOracle instances
      ```

      It aggregates their prices using **median calculation** — which resists outliers. If 3 oracles report [98, 100, 102], the median is 100.

      ### Key Patterns You'll Use

      **Factory Pattern** — `WhitelistOracle` deploys new `SimpleOracle` contracts:
      ```solidity
      SimpleOracle newOracle = new SimpleOracle(_owner);
      ```

      **Swap-and-Pop** — Gas-efficient array removal (O(1) instead of O(n)):
      ```solidity
      array[index] = array[array.length - 1];
      array.pop();
      ```

      **Stale Data Filtering** — Only use prices updated within `STALE_DATA_WINDOW` (24 seconds):
      ```solidity
      if (currentTime - timestamp < STALE_DATA_WINDOW) { /* price is fresh */ }
      ```

      **StatisticsUtils Library** — Already imported and applied to `uint256[]`:
      ```solidity
      validPrices.sort();
      return validPrices.getMedian();
      ```

      Open `packages/hardhat/contracts/00_Whitelist/WhitelistOracle.sol` — you'll see four empty functions to implement.

    questions:
      - text: "Why does the WhitelistOracle use a median instead of an average to aggregate prices? What attack does this protect against?"
        concepts:
          [
            "outlier",
            "manipulat",
            "extreme",
            "resist",
            "single bad",
            "median",
            "robust",
            "skew",
          ]
        hint: "Think about what happens if one oracle reports a wildly wrong price. How does median vs average handle that?"

    task:
      description: |
        Open `packages/hardhat/contracts/00_Whitelist/WhitelistOracle.sol`.

        Implement all four functions:

        1. **`addOracle(address _owner)`** — Deploy a new `SimpleOracle` with the given owner, push it to the `oracles` array, and emit `OracleAdded`

        2. **`removeOracle(uint256 index)`** — Validate the index, use swap-and-pop to remove the oracle at that index, emit `OracleRemoved`

        3. **`getPrice()`** — Loop through all oracles, filter stale prices (older than `STALE_DATA_WINDOW`), collect fresh prices into a right-sized array, sort and return the median using `StatisticsUtils`

        4. **`getActiveOracleNodes()`** — Similar to `getPrice()` but collect oracle **addresses** instead of prices. Return an array of active oracle addresses.

        Say **"check"** when you're ready!

        ### Try it out

        After tests pass:

        1. Run `yarn deploy --reset` to deploy your contracts
        2. Open http://localhost:3000 — test the whitelist oracle
        3. Try adding and removing oracles, and observe how the aggregated price changes
        4. Change the price of individual SimpleOracle contracts and add new oracle nodes to see how the median price changes

        > The `onlyOwner` modifiers are commented out so you have full control to experiment.

        Run `yarn simulate:whitelist` to see a live simulation with automated bots acting as oracle providers:
        ```
        yarn simulate:whitelist
        ```
      file: "packages/hardhat/contracts/00_Whitelist/WhitelistOracle.sol"
