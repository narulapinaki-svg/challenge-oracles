    task:
      description: |
        Still in `packages/hardhat/contracts/02_Optimistic/OptimisticOracle.sol`.

        Implement four functions:

        1. **`claimUndisputedReward(uint256 assertionId)`**
           - Proposal must exist, no dispute, past endTime, not claimed
