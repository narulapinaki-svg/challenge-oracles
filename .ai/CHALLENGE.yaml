  - id: "optimistic-rewards"
    title: "Optimistic Oracle — Reward Claims"
    description: "Implement reward claiming, refunds, and dispute settlement"

    context: |
      ## Reward Distribution

      The optimistic oracle has three payout scenarios:

      ### 1. Undisputed Proposal (Happy Path)
      Nobody disputes within the dispute window. The proposer gets:
      - Their bond back + the asserter's reward
      - Total: `reward + bond`

      ### 2. Disputed + Settled
      The decider resolves the dispute:
      - **Winner** gets: their bond back + the reward (`reward + bond`)
      - **Loser's bond** goes to the decider (payment for arbitration)
      - Winner = proposer if `proposedOutcome == resolvedOutcome`, else disputer

      ### 3. No Proposals (Refund)
      Nobody proposes before the deadline:
      - Asserter gets their reward back

      ### Safe ETH Transfers

      Always use the check-effects-interactions pattern:
      ```solidity
      assertion.claimed = true;  // effect FIRST
      (bool success, ) = payable(recipient).call{value: amount}("");  // interaction SECOND
      if (!success) revert TransferFailed();
      ```

      ### settleAssertion — The Decider's Role

      Only the `decider` contract can call this (via the `onlyDecider` modifier). It sets:
      - `resolvedOutcome` — the true answer
      - `winner` — proposer if they were right, disputer if they were right

    questions:
