  # CHECKPOINT 3: Optimistic Oracle — Architecture Overview
  # ============================================================
  - id: "optimistic-overview"
    title: "Optimistic Oracle Architecture"
    description: "Understand the optimistic oracle design pattern before implementing it"

    context: |
      ## What Makes It "Optimistic"?

      The system **assumes proposals are correct** unless someone disputes them. This creates a game-theoretic mechanism where economic incentives drive honest behavior.

      Unlike the previous oracles that focus on price data, this one handles **any binary (true/false) question** about real-world events.

      ### The Flow

      **Roles:**
      - **Asserter** — Posts a question + reward (e.g., "Did ETH hit $5000 on Jan 1?")
      - **Proposer** — Posts an answer + bond (e.g., "Yes, true")
      - **Disputer** — Challenges the answer + bond (if they disagree)
      - **Decider** — Resolves disputes and picks the winner

      **Lifecycle:**
      1. Asserter creates assertion with reward and time window
      2. Proposer proposes an outcome (true/false) with a bond = 2x reward
      3. Dispute window opens — if no dispute, proposer wins reward + bond back
      4. If disputed, the decider settles it — winner gets reward + their bond back, loser's bond goes to decider

      **If nobody proposes** before the assertion window closes, the asserter can reclaim their reward.

      ### Why Bonds?

      Bonds create **skin in the game**. A proposer risks losing their bond if they propose incorrectly and get disputed. A disputer risks their bond if the decider rules against them. This economic alignment keeps everyone honest.

      ### Real-World Applications
      - Cross-chain bridges: "Did transaction X happen on chain Y?"
      - Insurance: "Did flight ABC get delayed by 2+ hours?"
      - Prediction markets: "Did candidate X win?"

      This design is inspired by [UMA Protocol](https://uma.xyz/).

